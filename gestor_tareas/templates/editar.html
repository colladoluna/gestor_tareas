<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Tarea</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background-color: #fff0f6;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #d63384;
      font-size: 1.6rem;
      margin-bottom: 20px;
    }

    .formulario {
      max-width: 500px;
      margin: 0 auto;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #f1afc6;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      color: #555;
      font-size: 0.9rem;
    }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 8px;
      margin-bottom: 15px;
      border: 1px solid #f1afc6;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      box-sizing: border-box;
    }

    textarea {
      height: 80px;
      resize: none;
    }

    .botones {
      display: flex;
      gap: 10px;
    }

    .btn-guardar {
      background-color: #d63384;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      flex: 1;
    }

    .btn-guardar:hover {
      background-color: #b52b6e;
    }

    .btn-cancelar {
      background-color: #f1afc6;
      color: #d63384;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      flex: 1;
    }

    .btn-cancelar:hover {
      background-color: #e898b8;
    }
  </style>
</head>
<body>

  <h1>✏️ Editar Tarea</h1>

  <div class="formulario">
    <form action="/editar/{{ tarea.id }}" method="POST">
      <label for="titulo">Título</label>
      <input type="text" name="titulo" id="titulo" value="{{ tarea.titulo }}" required>

      <label for="descripcion">Descripción</label>
      <textarea name="descripcion" id="descripcion">{{ tarea.descripcion or '' }}</textarea>

      <label for="prioridad">Prioridad</label>
      <select name="prioridad" id="prioridad">
        <option value="baja"  {% if tarea.prioridad == 'baja'  %}selected{% endif %}>Baja</option>
        <option value="media" {% if tarea.prioridad == 'media' %}selected{% endif %}>Media</option>
        <option value="alta"  {% if tarea.prioridad == 'alta'  %}selected{% endif %}>Alta</option>
      </select>

      <div class="botones">
        <a class="btn-cancelar" href="/">Cancelar</a>
        <button class="btn-guardar" type="submit">Guardar</button>
      </div>
    </form>
  </div>

</body>
</html>
